<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="ZeroxAI — современный AI-чат" />
  <link rel="icon" href="assets/ZeroxAiLogo.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/ZeroxAiLogo.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>ZeroxAI</title>
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <img src="assets/ZeroxAiLogo.png" alt="ZeroxAI" class="logo" />
          <span class="brand-name">ZeroxAI</span>
        </div>
        <button id="newChatBtn" class="new-chat-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Новый чат
        </button>
      </div>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Поиск по истории..." />
      </div>
      <nav id="chatList" class="chat-list"></nav>
      <div class="sidebar-footer">
        <button id="settingsBtn" class="sidebar-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Настройки
        </button>
      </div>
    </aside>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <main id="main">
      <header id="topbar">
        <button id="menuBtn" class="menu-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-info">
          <h1 id="chatTitle">Новый чат</h1>
          <span id="chatStatus">Готов к работе</span>
        </div>
        <button id="topSettingsBtn" class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </header>

      <div id="messages" class="messages"></div>

      <div id="thinkingOverlay" class="thinking-overlay hidden">
        <video id="thinkingVideo" autoplay muted loop playsinline preload="auto">
          <source src="Animations/kling_20260710_VIDEO_Animate_on_5928_0-Picsart-BackgroundRemover.webm" type="video/webm">
        </video>
        <span class="thinking-label">Думаю...</span>
      </div>

      <form id="composer" class="composer">
        <div class="composer-inner">
          <textarea id="messageInput" rows="2" placeholder="Напишите сообщение..." autocomplete="off"></textarea>
          <button id="sendBtn" type="submit" class="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </form>
    </main>

    <aside id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <h2>Настройки</h2>
        <button id="closeSettingsBtn" class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="settingsForm" class="settings-form">
        <div class="field">
          <label for="profileName">Имя профиля</label>
          <input id="profileName" type="text" maxlength="40" placeholder="Ваше имя" />
        </div>
        <div class="field">
          <label>Тема</label>
          <div class="theme-selector">
            <button type="button" data-theme="system" class="active">Система</button>
            <button type="button" data-theme="light">Светлая</button>
            <button type="button" data-theme="dark">Тёмная</button>
          </div>
        </div>
        <div class="field">
          <label for="apiEndpoint">API Endpoint</label>
          <input id="apiEndpoint" type="text" value="/api/chat" />
        </div>
        <div class="field">
          <label for="modelName">Модель</label>
          <input id="modelName" type="text" value="openai/gpt-oss-120b" />
        </div>
        <div class="field">
          <label for="apiKeyField">API Key</label>
          <input id="apiKeyField" type="password" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="field">
          <label>AI анимация</label>
          <div class="checkbox-row">
            <input id="thinkingAnim" type="checkbox" checked />
            <label for="thinkingAnim">Показывать видео пока AI думает</label>
          </div>
        </div>
        <div class="field">
          <label for="typingSpeed">Скорость печати</label>
          <select id="typingSpeed">
            <option value="fast">Быстро</option>
            <option value="normal" selected>Средне</option>
            <option value="slow">Медленно</option>
          </select>
        </div>
        <button type="submit" class="save-btn">Сохранить</button>
      </form>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/14.1.0/markdown-it.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    if (document.documentElement.dataset.theme !== 'dark' && document.documentElement.dataset.theme !== 'light') {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      document.documentElement.dataset.theme = mq.matches ? 'dark' : 'light';
    }
  </script>
  <script src="src/app.js"></script>
</body>
</html>
